services:
  copilot:
    build: .
    ports: ["8080:8080"]
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - COPILOT_DB_URL=postgresql://copilot:copilot@db:5432/copilot
    depends_on: [db]
  worker:
    build: .
    command: python -m app.ops.draft_worker
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - COPILOT_DB_URL=postgresql://copilot:copilot@db:5432/copilot
    depends_on: [db]
  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=copilot
      - POSTGRES_PASSWORD=copilot
      - POSTGRES_DB=copilot
